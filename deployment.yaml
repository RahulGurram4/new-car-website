apiVersion: apps/v1
kind: Deployment
metadata:
  name: carwebsite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carwebsite
  template:
    metadata:
      labels:
        app: carwebsite
    spec:
      containers:
        - name: carwebsite
          image: docker.io/your-dockerhub-username/drivenova-motors:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
