apiVersion: v1
kind: Namespace
metadata:
  name: carwebsite
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carwebsite
  namespace: carwebsite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carwebsite
  template:
    metadata:
      labels:
        app: carwebsite
    spec:
      containers:
        - name: carwebsite
          image: docker.io/your-dockerhub-username/drivenova-motors:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: carwebsite-service
  namespace: carwebsite
spec:
  type: ClusterIP
  selector:
    app: carwebsite
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carwebsite-ingress
  namespace: carwebsite
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /index.html
spec:
  rules:
    - host: car.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: carwebsite-service
                port:
                  number: 80
